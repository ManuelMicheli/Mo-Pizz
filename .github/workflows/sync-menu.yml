name: Sync Menu from Plateform

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Sync menu from Plateform
        run: node scripts/sync-menu.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/menuData.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No menu changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Menu changes detected!"
            git diff --stat src/data/menuData.js
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/menuData.js
          git commit -m "chore(menu): auto-sync menu from Plateform

          Automated update via sync-menu.mjs scheduled workflow."
          git push
